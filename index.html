<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آلة حاسبة أنيقة</title>
    <!-- استدعاء Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-black flex items-center justify-center p-4 font-sans text-right">
    
    <div class="bg-gray-900/40 backdrop-blur-2xl border border-gray-700/50 p-6 rounded-[2.5rem] shadow-2xl shadow-black/50 w-full max-w-sm">
        
        <!-- رأس الحاسبة -->
        <div class="flex justify-between items-center mb-6 px-2">
            <div class="flex gap-2">
                <div class="w-3 h-3 rounded-full bg-rose-500/80"></div>
                <div class="w-3 h-3 rounded-full bg-amber-500/80"></div>
                <div class="w-3 h-3 rounded-full bg-emerald-500/80"></div>
            </div>
            <span class="text-gray-400 text-sm font-medium select-none" dir="rtl">آلة حاسبة</span>
        </div>

        <!-- الشاشة -->
        <div class="bg-gray-950/50 border border-gray-800 rounded-3xl p-5 mb-6 shadow-inner h-32 flex flex-col justify-end relative overflow-hidden">
            <!-- تأثير توهج خفيف داخل الشاشة -->
            <div class="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-b from-white/[0.02] to-transparent pointer-events-none"></div>
            
            <div id="display-expression" class="text-gray-400 text-lg font-light tracking-wider h-6 mb-1 truncate text-right">
                <!-- التعبير الحسابي يظهر هنا -->
            </div>
            <div id="display-result" class="text-white text-5xl font-light tracking-tight truncate text-right" style="word-wrap: break-word;">
                0
            </div>
        </div>

        <!-- لوحة المفاتيح -->
        <div id="keypad" class="grid grid-cols-4 gap-3">
            <!-- سيتم توليد الأزرار هنا بواسطة JavaScript -->
        </div>
        
    </div>

    <script>
        // المتغيرات الأساسية (تعادل State في React)
        let expression = '';
        let result = '0';

        // عناصر الشاشة
        const displayExpression = document.getElementById('display-expression');
        const displayResult = document.getElementById('display-result');

        // تحديث الشاشة
        function updateDisplay() {
            displayExpression.textContent = expression || '';
            
            if (expression === '') {
                displayResult.textContent = result;
            } else {
                const match = expression.match(/[0-9.]*$/);
                displayResult.textContent = (match && match[0]) ? match[0] : expression.slice(-1);
            }
        }

        // منطق التعامل مع الضغطات
        function handlePress(value) {
            if (value === 'C') {
                expression = '';
                result = '0';
                updateDisplay();
                return;
            }

            if (value === '⌫') {
                expression = expression.slice(0, -1);
                updateDisplay();
                return;
            }

            if (value === '=') {
                try {
                    const safeExpression = expression.replace(/×/g, '*').replace(/÷/g, '/');
                    if (!safeExpression) return;
                    
                    const evalResult = new Function('return ' + safeExpression)();
                    
                    if (!isFinite(evalResult) || isNaN(evalResult)) {
                        result = 'خطأ';
                    } else {
                        const formattedResult = Number.isInteger(evalResult) 
                            ? evalResult.toString() 
                            : parseFloat(evalResult.toFixed(8)).toString();
                        result = formattedResult;
                        expression = formattedResult;
                    }
                } catch (error) {
                    result = 'خطأ';
                }
                updateDisplay();
                return;
            }

            if (value === '.') {
                const parts = expression.split(/[+\-×÷]/);
                const currentPart = parts[parts.length - 1];
                if (currentPart.includes('.')) return;
            }

            const operators = ['+', '-', '×', '÷'];
            if (operators.includes(value) && operators.includes(expression.slice(-1))) {
                expression = expression.slice(0, -1) + value;
                updateDisplay();
                return;
            }

            expression += value;
            updateDisplay();
        }

        // إعداد وتوليد الأزرار
        const buttons = [
            { label: 'C', type: 'action' },
            { label: '⌫', type: 'action' },
            { label: '%', type: 'operator' },
            { label: '÷', type: 'operator' },
            { label: '7', type: 'number' },
            { label: '8', type: 'number' },
            { label: '9', type: 'number' },
            { label: '×', type: 'operator' },
            { label: '4', type: 'number' },
            { label: '5', type: 'number' },
            { label: '6', type: 'number' },
            { label: '-', type: 'operator' },
            { label: '1', type: 'number' },
            { label: '2', type: 'number' },
            { label: '3', type: 'number' },
            { label: '+', type: 'operator' },
            { label: '0', type: 'number', className: 'col-span-2' },
            { label: '.', type: 'number' },
            { label: '=', type: 'equal' },
        ];

        const keypad = document.getElementById('keypad');

        buttons.forEach(btn => {
            const buttonEl = document.createElement('button');
            buttonEl.textContent = btn.label;
            
            // تحديد الكلاسات بناءً على نوع الزر
            let baseClass = "text-2xl font-medium rounded-2xl flex items-center justify-center transition-all duration-200 active:scale-95 shadow-sm ";
            
            if (btn.type === 'action') {
                baseClass += "bg-rose-500/10 text-rose-500 hover:bg-rose-500/20";
            } else if (btn.type === 'operator') {
                baseClass += "bg-indigo-500/10 text-indigo-400 hover:bg-indigo-500/20";
            } else if (btn.type === 'equal') {
                baseClass += "bg-indigo-600 text-white hover:bg-indigo-500 shadow-lg shadow-indigo-600/30";
            } else {
                baseClass += "bg-gray-800 text-gray-200 hover:bg-gray-700";
            }

            if (btn.className) {
                baseClass += ` ${btn.className}`;
            }

            buttonEl.className = baseClass;
            buttonEl.style.aspectRatio = btn.label === '0' ? 'auto' : '1/1';
            
            // إضافة حدث النقر
            buttonEl.onclick = () => handlePress(btn.label);
            
            keypad.appendChild(buttonEl);
        });
    </script>
</body>
</html>
